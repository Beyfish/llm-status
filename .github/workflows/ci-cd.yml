name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: npx vitest run

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: npx vitest run
      - name: Build Windows portable
        run: bun run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-status-windows
          path: release/*.exe
          retention-days: 30

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: npx vitest run
      - name: Build macOS
        run: bun run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-status-macos
          path: release/*.dmg
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: npx vitest run
      - name: Build Linux
        run: bun run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-status-linux
          path: release/*.AppImage
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [typecheck, test, build-win, build-mac, build-linux]
    if: github.event_name == 'push' && github.ref_name == 'master' || github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Detect VERSION change in this push
        id: version_change
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if git diff --name-only "$BEFORE" "$AFTER" | grep -qx 'VERSION'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Stop if VERSION did not change
        if: steps.version_change.outputs.changed != 'true'
        run: echo "No VERSION change, skipping release creation"
      - name: Download all artifacts
        if: steps.version_change.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate release notes from CHANGELOG
        if: steps.version_change.outputs.changed == 'true'
        shell: bash
        run: |
          VERSION=$(tr -d '\n' < VERSION)
          bun scripts/release/print-release-notes.ts "$VERSION" > release-notes.md
          test -s release-notes.md
      - name: Create GitHub Release
        if: steps.version_change.outputs.changed == 'true'
        shell: bash
        run: |
          VERSION=$(tr -d '\n' < VERSION)
          TAG="v$VERSION"
          gh release create "$TAG" dist/**/* --title "$TAG" --notes-file release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
