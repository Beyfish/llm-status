name: Auto Tag Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Detect VERSION change in this push
        id: version_change
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if git diff --name-only "$BEFORE" "$AFTER" | grep -qx 'VERSION'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if VERSION did not change
        if: steps.version_change.outputs.changed != 'true'
        run: echo "No VERSION change, skipping release tag"

      - name: Validate release metadata
        if: steps.version_change.outputs.changed == 'true'
        run: bun run release:validate

      - name: Create and push tag
        if: steps.version_change.outputs.changed == 'true'
        shell: bash
        run: |
          # Read VERSION, strip BOM (UTF-8 BOM is 0xEF 0xBB 0xBF), whitespace, newlines
          VERSION=$(sed '1s/^\xEF\xBB\xBF//' VERSION | tr -d '[:space:]')
          TAG="v$VERSION"

          # Validate tag format: must be vX.Y.Z or vX.Y.Z.W
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "ERROR: Invalid tag format: '$TAG'"
            echo "VERSION file content (hex):"
            xxd VERSION | head -3
            exit 1
          fi

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "release $TAG"
          git push origin "$TAG"
